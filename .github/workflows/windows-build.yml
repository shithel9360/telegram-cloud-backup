name: Build Windows Executable

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install customtkinter pystray piexif ffmpeg-python opencv-python fastapi uvicorn sqlalchemy jinja2 pyinstaller Pillow telethon
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --add-data "src/api/templates;src/api/templates" main_gui.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TelegramBackupPro-Windows
        path: dist/main_gui.exe

    - name: Create Release and Upload EXE
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        $tag = "v" + (Get-Date -Format "yyyy.MM.dd.HHmm")
        gh release create $tag dist\main_gui.exe --title "Backup Pro Build $tag" --notes "Automated pro-grade build with Setup Wizard and AI features."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

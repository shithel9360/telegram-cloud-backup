name: Build Windows Executable

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install telethon pyinstaller requests watchdog

    - name: Extract version from app_web.py
      id: get_version
      shell: pwsh
      run: |
        $code = Get-Content app_web.py -Raw
        if ($code -match 'APP_VERSION\s*=\s*"([^"]+)"') {
          $ver = $matches[1]
        } else {
          $ver = "1.0.0"
        }
        echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
        echo "Detected version: $ver"

    - name: Delete existing release if same version exists
      continue-on-error: true
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete "v${{ steps.get_version.outputs.VERSION }}" -y
        git push --delete origin "v${{ steps.get_version.outputs.VERSION }}"

    - name: Build with PyInstaller
      shell: pwsh
      run: |
        pyinstaller --onefile --noconsole --name TelegramBackup app_web.py

    - name: Create Release
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "v${{ steps.get_version.outputs.VERSION }}"
        $notes = "Download TelegramBackup.exe and double-click to run. Your browser opens automatically.`n`nDeveloped by Shithel"
        gh release create $tag dist\TelegramBackup.exe --title "Telegram Backup Pro $tag" --notes $notes

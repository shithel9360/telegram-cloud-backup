name: Build Windows Executable

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install telethon pyinstaller requests

    - name: Extract version from app_web.py
      id: get_version
      run: |
        $ver = python -c "import re; m=re.search(r'APP_VERSION\s*=\s*\"([^\"]+)\"', open('app_web.py').read()); print(m.group(1))"
        echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

    - name: Delete existing release if same version exists
      continue-on-error: true
      run: |
        gh release delete "v${{ steps.get_version.outputs.VERSION }}" -y
        git push --delete origin "v${{ steps.get_version.outputs.VERSION }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name TelegramBackup app_web.py

    - name: Create Release with version tag
      run: |
        $tag = "v${{ steps.get_version.outputs.VERSION }}"
        gh release create $tag dist\TelegramBackup.exe `
          --title "Telegram Backup Pro v${{ steps.get_version.outputs.VERSION }}" `
          --notes "## What's new in this version
          
- Download and double-click TelegramBackup.exe to run
- The app opens in your browser automatically  
- No installation required
          
**Developed by Shithel**"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Windows Executable

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install telethon pyinstaller
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --name TelegramBackup app_web.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TelegramBackupPro-Windows
        path: dist/TelegramBackup.exe

    - name: Create Release and Upload EXE
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        $tag = "v" + (Get-Date -Format "yyyy.MM.dd.HHmm")
        gh release create $tag dist\TelegramBackup.exe --title "Backup Pro Web Edition $tag" --notes "One-click portable Web App version. Just double click to run!"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

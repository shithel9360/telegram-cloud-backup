<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Backup Pro Dashboard</title>
    <style>
        :root {
            --primary: #0088cc;
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            background: var(--card);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 { font-weight: 800; margin-bottom: 0.5rem; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 2rem 0; }
        .stat-card { background: rgba(255, 255, 255, 0.05); padding: 1rem; border-radius: 16px; text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: 700; color: #38bdf8; }
        .stat-label { font-size: 0.8rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.05em; }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .progress-bar { height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 9999px; overflow: hidden; margin-top: 1rem; }
        .progress-fill { height: 100%; background: #38bdf8; width: 0%; transition: width 1s ease; }
    </style>
    <script>
        async function updateStats() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('total-files').innerText = data.total_files;
            document.getElementById('total-size').innerText = data.total_size;
            document.getElementById('uptime').innerText = data.uptime;
            document.getElementById('status').innerText = data.status;
        }
        setInterval(updateStats, 2000);
    </script>
</head>
<body>
    <div class="container">
        <div class="status-badge" id="status">Active</div>
        <h1>Backup Pro Dashboard</h1>
        <p style="opacity: 0.7;">Real-time synchronization status</p>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-val" id="total-files">0</div>
                <div class="stat-label">Files Backed Up</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="total-size">0 B</div>
                <div class="stat-label">Storage Used</div>
            </div>
        </div>
        
        <div class="stat-card" style="width: 100%; box-sizing: border-box;">
            <div class="stat-label">System Uptime</div>
            <div id="uptime" style="font-weight: 600;">00:00:00</div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" style="width: 100%;"></div>
        </div>
    </div>
</body>
</html>
